      name: Playwright Tests with Xray/Jira Integration

      on:
        workflow_dispatch:
        push:
          branches: [ master ]
        pull_request:
          branches: [ master ]

      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            # ---------------- PYTHON DEPS ----------------
            - name: Install Python dependencies (Hotels)
              run: |
                cd hotels/backend
                pip install -r requirements.txt
                cd ../../

            - name: Install Python dependencies (Taste)
              run: |
                cd taste-explorer/backend
                pip install -r requirements.txt
                cd ../../

            # ---------------- BACKENDS ----------------
            - name: Start Hotels Backend
              run: |
                cd hotels/backend
                nohup python main.py > hotels.log 2>&1 &
                sleep 5
                echo "=== Hotels Backend Logs ==="
                cat hotels.log
                cd ../../

            - name: Start Taste Backend
              run: |
                cd taste-explorer/backend
                nohup python main.py > taste.log 2>&1 &
                sleep 5
                echo "=== Taste Backend Logs ==="
                cat taste.log
                cd ../../

            # ---------------- PORTS ----------------
            - name: Check running ports
              run: |
                ss -tuln | grep LISTEN || true

            # ---------------- CURL ----------------
            - name: Test backend endpoints
              run: |
                curl -v http://localhost:8001 || true
                curl -v http://localhost:8002 || true

            # ---------------- NODE SETUP ----------------
            - name: Install dependencies
              run: npm install --legacy-peer-deps

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            # ---------------- FRONTENDS ----------------
            - name: Install Hotels Frontend dependencies
              run: |
                cd hotels/react-app
                npm install
                cd ../../..

            - name: Start Hotels Frontend
              run: |
                cd hotels/react-app
                nohup npm run dev > ../../../../hotels-frontend.log 2>&1 &
                cd ../../..

            - name: Install Taste Frontend dependencies
              run: |
                cd taste-explorer/react-app
                npm install
                cd ../../..

            - name: Start Taste Frontend
              run: |
                cd taste-explorer/react-app
                nohup npm run dev > ../../../../taste-frontend.log 2>&1 &
                cd ../../..


            # ---------------- WAIT ----------------
            - name: Wait for backends
              run: npx wait-on http://localhost:8001 http://localhost:8002 --timeout 120000

            - name: Wait for frontends
              run: npx wait-on http://localhost:5174 http://localhost:5176

            # ---------------- TEST ----------------
            - name: Run Playwright tests
              run: npx playwright test --reporter=junit

            # ---------------- ARTIFACT ----------------
            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: playwright-results
                path: test-results/results.xml

            # ---------------- XRAY ----------------
            - name: Import results to Xray
              env:
                XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
                XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
                JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
              run: |
                TOKEN=$(curl -s -X POST \
                  -H "Content-Type: application/json" \
                  -d '{"client_id": "'$XRAY_CLIENT_ID'", "client_secret": "'$XRAY_CLIENT_SECRET'"}' \
                  https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')

                curl -s -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -F "file=@test-results/results.xml" \
                  "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$JIRA_PROJECT_KEY"
    branches: [ master ]
  pull_request:
    branches: [ master ]

