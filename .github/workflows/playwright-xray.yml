jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 🚀 Build Docker services in parallel
      - name: Build & start services
        run: docker compose -f docker-compose.full.yml up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            curl -sSf http://localhost:8005/health && break
            sleep 2
          done
          for i in $(seq 1 60); do
            curl -sSf http://localhost:8002/health && break
            sleep 2
          done

      # 🚀 Run tests directly (no extra container)
      - name: Run Playwright tests
        run: npx playwright test --reporter=junit

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/results.xml